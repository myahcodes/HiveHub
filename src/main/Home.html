<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The HiveHub-Home</title>
    <link rel="icon" href="webapp/assets/img/icons/defaultPfp.svg" />
    <link rel="stylesheet" href="webapp/Styles/main.css" />
    <link rel="stylesheet" href="webapp/Styles/home.css" />
</head>
<body class="Main-page">
    <div id="left-nav">
        <a href="Profile.html" class=""></a>
        <a href="Hive.html" class="left-bttns icon-hive"></a>
    </div>
    <div id="right-nav">
        <a href="Discovery.html" class="right-bttns icon-search"></a>
        <a href="Posting.html" class="right-bttns icon-post"></a>
        <a href="Buzzboard.html" class="right-bttns icon-buzzboard"></a>
        <a href="Home.html" class="right-bttns icon-home"></a>
    </div>
    <div class="HH-Home">
        <div class="HH-Header">
            <h1>HiveHub</h1>
        </div>
        <div class="HH-default" style="width: 95%">
            <div class="buzz-feed">
                <div class="buzz">
                    <div class="buzz-header">
                        <img src="webapp/assets/img/placeholder/defaultPfpPlcHldr.svg" alt="Thrift Store Pfp" class="profile" />
                        <div class="user-info">
                            <span>Thrift Store Express</span>
                            <span class="rating-score">3</span>
                            <span class="user-info-divide">Opens 10 AM </span>
                            <span class="distance">1.5 mi</span>
                        </div>
                    </div>
                    <div class="buzz-content">
                        <noscript>Check out our new collection of vintage clothing and accessories! Great deals await you.</noscript>
                        <!--img placeholder here -->
                        <img src="webapp\assets\img\placeholder\page-1.jpeg" alt="Post Image" class="buzz-media" />
                    </div>
                    <div class="buzz-actions">
                        <div style="display: flex; gap: 15px;">
                            <button class="action-bttns commentFeedIcon"></button>
                            <button class="action-bttns addToBuzzboardIcon"></button>
                        </div>
                        <div>
                            <button class="action-bttns shareIcon"></button>
                        </div>
                    </div>
                </div>
                <div class="buzz">
                    <div class="buzz-header">
                        <img src="webapp\assets\img\placeholder\defaultPfpPlcHldr.svg" alt="Candy Store Pfp" class="profile" />
                        <div class="user-info">
                            <span>Candy Mart</span>
                            <span class="rating-score">4</span>
                            <span class="user-info-divide">Opens 10 AM </span>
                            <span class="distance">2.5 mi</span>
                        </div>
                    </div>
                    <div class="buzz-content">
                        <noscript>Wow so much candy!</noscript>
                        <!--img placeholder here -->
                        <img src="webapp\assets\img\placeholder\page-2.jpeg" alt="Post Image" class="buzz-media" />
                    </div>
                    <div class="buzz-actions">
                        <div style="display: flex; gap: 15px;">
                            <button class="action-bttns commentFeedIcon"></button>
                            <button class="action-bttns addToBuzzboardIcon"></button>
                        </div>
                        <div>
                            <button class="action-bttns shareIcon"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <hr id="divider" />
        <footer class="HH-footer">
            <a href="Contact.html">contact us</a>
            <a href="about.html">our mission</a>
        </footer>
    </div>
    <script src="webapp/assets/js/home.js"></script>
    <script src="webapp/assets/js/navBttn_activity.js"></script>
</body>
</html>
