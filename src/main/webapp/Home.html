<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The HiveHub-Home</title>
    <link rel="icon" href="assets/img/icons/defaultPfp.svg" />
    <link rel="stylesheet" href="Styles/main.css" />
    <link rel="stylesheet" href="Styles/home.css" />
</head>
<body class="Main-page">
    <div id="left-nav">
        <svg class="nav-bg">
            <use href="assets/img/nav/bar/navBars.svg#leftnav"></use>
        </svg>
        <a href="Hive.html" class="left-bttns icon-hive">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#hiveicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#hiveiconslct"></use>
            </svg>
        </a>
    </div>

    <div id="right-nav">
        <svg class="nav-bg">
            <use href="assets/img/nav/bar/navBars.svg#rightnav"></use>
        </svg>
        <a href="Discovery.html" class="right-bttns icon-discovery">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#discoveryicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#discoveryiconslct"></use>
            </svg>
        </a>
        <a href="Posting.html" class="right-bttns icon-post">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#posticon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#posticonslct"></use>
            </svg>
        </a>
        <a href="Buzzboard.html" class="right-bttns icon-buzzboard">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#buzzboardicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#buzzboardiconslct"></use>
            </svg>
        </a>
        <a href="Home.html" class="right-bttns icon-home active">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#homeicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttnIcons/bttns.svg#homeiconslct"></use>
            </svg>
        </a>
    </div>

    <div class="HH-Home">
        <div class="HH-Header">
            <h1>HiveHub</h1>
        </div>
        <div class="HH-default" style="width: 95%">
            <div class="buzz-feed" id="buzz-feed">
                <p id="feed-loading" style="color:#ffb84d; text-align:center;">Loading posts...</p>
            </div>
        </div>
        <hr id="divider" />
        <footer class="HH-footer">
            <a href="Contact.html">contact us</a>
            <a href="about.html">our mission</a>
        </footer>
    </div>

    <script src="assets/js/home.js"></script>
    <script src="assets/js/navBttn_activity.js"></script>
    <script>
        fetch('assets/img/nav/bttnIcons/bttns.svg')
            .then(r => r.text())
            .then(svg => {
                const div = document.createElement('div');
                div.style.display = 'none';
                div.innerHTML = svg;
                document.body.insertBefore(div, document.body.firstChild);
            });
    </script>
</body>
</html>
