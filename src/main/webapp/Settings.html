<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hivehub-Settings</title>
    <link rel="icon" href="webapp/assets/img/icons/defaultPfp.svg" />
    <link rel="stylesheet" href="Styles/main.css">
    <link rel="stylesheet" href="Styles/settings.css"/>
    <!--<link rel="stylesheet" href="Styles/home.css" />-->
</head>
<body class="Main-page">
    <div id="left-nav">
        <svg class="nav-bg">
            <use href="/assets/img/nav/bar/navBars.svg#leftnav"></use>
        </svg>
        <a href="Hive.html" class="left-bttns icon-hive">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="/assets/img/nav/bttnIcons/bttns.svg#hiveicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="/assets/img/nav/bttnIcons/bttns.svg#hiveiconslct"></use>
            </svg>
        </a>
    </div>

    <div id="right-nav">
        <svg class="nav-bg">
            <use href="/assets/img/nav/bar/navBars.svg#rightnav">
            </use>
        </svg>
        <a href="Discovery.html" class="right-bttns icon-discovery">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="/assets/img/nav/bttnIcons/bttns.svg#discoveryicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="webapp/assets/img/nav/bttnIcons/bttns.svg#discoveryiconslct"></use>
            </svg>
        </a>
        <a href="Posting.html" class="right-bttns icon-post">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="webapp/assets/img/nav/bttnIcons/bttns.svg#posticon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="webapp/assets/img/nav/bttnIcons/bttns.svg#posticonslct"></use>
            </svg>
        </a>
        <a href="Buzzboard.html" class="right-bttns icon-buzzboard">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="webapp/assets/img/nav/bttnIcons/bttns.svg#buzzboardicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="webapp/assets/img/nav/bttnIcons/bttns.svg#buzzboardiconslct"></use>
            </svg>
        </a>
        <a href="Home.html" class="right-bttns icon-home active">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="webapp/assets/img/nav/bttnIcons/bttns.svg#homeicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="webapp/assets/img/nav/bttnIcons/bttns.svg#homeiconslct"></use>
            </svg>
        </a>
    </div>

    <div class="HH-contents">

        <div class="HH-Header">
            <h1>Settings</h1>
        </div>

        <div id="search-bar-settings">

            <div class="searchbar">
                <img id="search-comb" src="webapp/assets/img/icons/hiveIcon.svg" alt="img" />
                <input id="search-bar" placeholder="search" onmousedown="new Audio('/webapp/assets/audio/click-sound.mp3').play()" />
            </div>

        </div>

        <div class="options">

            <div class="Profile-options">

                <h2 class="option">Profile</h2>

                <p id="icon-option" class="option">Icon</p>

                <template id="icon-change-template">

                    <div class="option-wrapper">
                        <div class="elements-container">

                            <div class="option-background">
                                <h3>Pick an Icon</h3>
                                <p>icon content here</p>
                            </div>

                        </div>

                    </div>

                </template>

                <p id="display-option" class="option">Display</p>

                <template id="display-change-template">

                    <div class="option-wrapper">
                        <div class="elements-container">

                            <div class="option-background">
                                <h3>Display Settings</h3>

                                <div class="input-row">
                                    <p>Displayed name: </p>
                                    <input id="name-change-input" />
                                </div>
                                <p>Display color</p>
                                <div id="color-options">
                                    <label class="color-container"><input id="default-color" value="#ffb84d" type="radio" name="color" /></label>
                                    <label class="color-container"><input id="pink-color" value="hotpink" type="radio" name="color" /></label>
                                    <label class="color-container"><input id="lightblue-color" value="deepskyblue" type="radio" name="color" /></label>
                                    <label class="color-container"><input id="blue-color" value="blue" type="radio" name="color" /></label>
                                    <label class="color-container"><input id="lilac-color" value="mediumpurple" type="radio" name="color" /></label>
                                    <label class="color-container"><input id="green-color" value="lawngreen" type="radio" name="color" /></label>
                                </div>
                            </div>


                        </div>
                    </div>

                </template>

                <p id="bio-option" class="option">Bio</p>

                <template id="bio-change-template">

                    <div class="option-wrapper">
                        <div class="elements-container">

                            <div class="option-background">
                                <h3>Whats buzzing with you?</h3>

                                <!--Editor Container-->

                                <div class="post-editor">
                                    <div class="toolbar">
                                        <button data-cmd="undo" title="Undo"><i data-lucide="undo-2" class="w-4 h-4"></i></button>
                                        <button data-cmd="redo" title="Redo"><i data-lucide="redo-2" class="w-4 h-4"></i></button>

                                        <div class="w-[1px] h-4 bg-orange-300/30 self-center mx-1"></div>

                                        <div class="dropdown">
                                            <button class="dropdown-trigger"><i data-lucide="type" class="w-4 h-4"></i> <i data-lucide="chevron-down" class="w-3 h-3"></i></button>
                                            <div class="dropdown-content">
                                                <button class="dropdown-item" data-cmd="h1">Heading 1</button>
                                                <button class="dropdown-item" data-cmd="h2">Heading 2</button>
                                                <button class="dropdown-item" data-cmd="paragraph">Text</button>
                                            </div>
                                        </div>

                                        <button data-cmd="bold" title="Bold"><i data-lucide="bold" class="w-4 h-4"></i></button>
                                        <button data-cmd="italic" title="Italic"><i data-lucide="italic" class="w-4 h-4"></i></button>

                                        <div class="w-[1px] h-4 bg-orange-300/30 self-center mx-1"></div>

                                        <div class="dropdown">
                                            <button class="dropdown-trigger"><i data-lucide="list" class="w-4 h-4"></i> <i data-lucide="chevron-down" class="w-3 h-3"></i></button>
                                            <div class="dropdown-content">
                                                <button class="dropdown-item" data-cmd="bulletList">Bulleted List</button>
                                                <button class="dropdown-item" data-cmd="orderedList">Numbered List</button>
                                            </div>
                                        </div>

                                        <div class="w-[1px] h-4 bg-orange-300/30 self-center mx-1"></div>

                                        <button id="btn-link" title="Link"><i data-lucide="link" class="w-4 h-4"></i></button>
                                        <button id="btn-image" title="Image"><i data-lucide="image" class="w-4 h-4"></i></button>
                                        <button id="btn-location" title="Location"><i data-lucide="map-pin" class="w-4 h-4"></i></button>
                                    </div>

                                    <div id="editor-content" class="tiptap no-scrollbar"></div>
                                </div>
                                <div class="footer">
                                    <div class="relative">
                                        <button id="emoji-trigger" class="emoji-btn">
                                            <i data-lucide="smile" class="w-5 h-5"></i>
                                        </button>
                                        <div id="emoji-picker-container"></div>
                                    </div>

                                    <div class="flex items-center gap-4">
                                        <span id="post-status" class="text-[#ffb84d] text-xs font-bold hidden">CONTENT SAVED</span>
                                        <button id="post-btn" class="post-btn">Post</button>
                                    </div>
                                </div>
                            </div>

                        </div>

                    </div>

                </template>

            </div>

            <div class="Account-options">
                <h2 class="option">Account</h2>

                <p id="password-option" class="option">Change password</p>

                <template id="password-change-template">

                    <div class="option-wrapper">
                        <div class="elements-container">

                            <div class="option-background">
                                <div class="input-row">
                                    <p>Current Password:</p>
                                    <input />
                                    <p>New Password:</p>
                                    <input type="password" />
                                    <p>Confirm new Password:</p>
                                    <input type="password" />
                                </div>
                            </div>

                        </div>

                    </div>

                </template>

                <p id="email-option" class="option">Update email/user</p>

                <template id="email-change-template">

                    <div class="option-wrapper">
                        <div class="elements-container">

                            <div class="option-background">
                                <div class="input-row">
                                    <p>New email:</p>
                                    <input type="email" />
                                    <p>Confirm new email:</p>
                                    <input type="email" />
                                </div>
                            </div>

                        </div>

                    </div>

                </template>

                <p id="delete-option" class="option">Deactivate</p>

                <template id="account-deletion-template">

                    <div class="option-wrapper">
                        <div class="elements-container">

                            <div class="option-background">
                                <h3>Delete Account</h3>
                                <p>Are you sure you want to delete your account?</p>
                            </div>

                        </div>

                    </div>

                </template>

            </div>

            <div class="Privacy-options">
                <h2 class="option">Privacy</h2>

                <p id="event-option" class="option">Event activity</p>

                <div id="visibility-container">
                    <p id="visibility-option" class="option" data-bs-toggle="tooltip" title="turn off to hide your account">Visibility</p>

                    <label class="visibility-toggle">
                        <input type="checkbox" />
                        <span id="slider" onclick="new Audio('/webapp/assets/audio/click-sound.mp3').play()"></span>
                    </label>
                </div>

            </div>

        </div>

        <button id="logout_button" onclick="window.location.href = 'Login.html'">Logout</button>

        <div>
            <noscript>Scripts are required to run the site.</noscript>
        </div>

        <footer class="HH-footer">
            <a href="contact.html">contact us</a>
            <a href="about.html">about us</a>
        </footer>

    </div>


    <script src="assets/js/settings.js"></script>
    <script src="webapp/assets/js/settings_searchbar.js"></script>
    <script src="webapp/assets/js/theme.js"></script>
    <script src="webapp/assets/js/updateTheme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="webapp/assets/js/post_form.js"></script>
    <script src="assets/js/navBttn_activity.js"></script>
</body>
</html>
