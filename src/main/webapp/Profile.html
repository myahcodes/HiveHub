<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The HiveHub-Profile</title>
    <link rel="icon" href="assets/img/icons/defaultPfp.svg" />
    <link rel="stylesheet" href="Styles/main.css" />
    <link rel="stylesheet" href="Styles/profile.css" />
</head>
<body class="Main-page">
    <div id="left-nav">
        <svg class="nav-bg">
            <use href="assets/img/nav/bar/navBars.svg#leftnav"></use>
        </svg>
        <a href="Hive.html" class="left-bttns icon-hive">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#hiveicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#hiveiconslct"></use>
            </svg>
        </a>
    </div>

    <div id="right-nav">
        <svg class="nav-bg">
            <use href="assets/img/nav/bar/navBars.svg#rightnav"></use>
        </svg>
        <a href="Discovery.html" class="right-bttns icon-discovery">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#discoveryicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#discoveryiconslct"></use>
            </svg>
        </a>
        <a href="Posting.html" class="right-bttns icon-post">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#posticon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#posticonslct"></use>
            </svg>
        </a>
        <a href="Buzzboard.html" class="right-bttns icon-buzzboard">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#buzzboardicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#buzzboardiconslct"></use>
            </svg>
        </a>
        <a href="Home.html" class="right-bttns icon-home">
            <svg class="button-icon icon-static" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#homeicon"></use>
            </svg>
            <svg class="button-icon icon-hover" aria-hidden="true">
                <use href="assets/img/nav/bttn_icons/bttns.svg#homeiconslct"></use>
            </svg>
        </a>
    </div>

    <div class="HH-MyHive">
        <div class="HH-Header">
            <h1>My Hive</h1>
        </div>
        <div class="HH-contents">
            <div class="profile-container">
                <img src="assets/img/icons/defaultPfp.svg" alt="Profile Picture" class="profile-pic" id="profile-pic" />
                <div class="label-area">
                    <h2 id="profile-name">Loading...</h2>
                    <span id="profile-username" style="color: rgba(255,184,77,0.7);">@username</span>
                    <span id="profile-email" style="color: rgba(255,184,77,0.5); font-size:13px;"></span>
                </div>
                <button id="logout-btn" onclick="window.location.href='logout'">Log Out</button>
            </div>

            <div class="buzz-container" id="user-posts">
                <p style="color:#ffb84d; text-align:center;">Loading your posts...</p>
            </div>

            <div>
                <noscript>Scripts are required to run the site.</noscript>
            </div>
        </div>
        <hr id="divider" />
        <footer class="HH-footer">
            <a href="Contact.html">contact us</a>
            <a href="about.html">our mission</a>
        </footer>
    </div>

    <script>
        ['assets/img/nav/bar/navBars.svg', 'assets/img/nav/bttn_icons/bttns.svg'].forEach(src => {
            fetch(src)
                .then(r => r.text())
                .then(svg => {
                    const div = document.createElement('div');
                    div.style.display = 'none';
                    div.innerHTML = svg;
                    document.body.insertBefore(div, document.body.firstChild);
                });
        });
    </script>
    <script src="assets/js/profile.js"></script>
    <script src="assets/js/navBttn_activity.js"></script>
</body>
</html>
